services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: allright-web
    ports:
      - "4000:4000"
    env_file:
      - .env.docker
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-allright}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: allright-migrate
    env_file:
      - .env.docker
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-allright}
    depends_on:
      db:
        condition: service_healthy
    command: npx prisma migrate deploy
    networks:
      - app
    restart: "no"

  db:
    image: postgres:15-alpine
    container_name: allright-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-allright}
    # 외부 노출 차단 (Docker 내부 네트워크에서만 접근). 디버깅 필요 시 아래 주석 해제:
    # ports:
    #   - "127.0.0.1:5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-allright}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - app
    restart: unless-stopped

volumes:
  db_data:

networks:
  app:
    driver: bridge
