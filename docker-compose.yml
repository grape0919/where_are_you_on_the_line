services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: allright-web
    ports:
      - "4000:4000"
    env_file:
      - .env.docker
    environment:
      - USE_DB=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-allright}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: allright-migrate
    env_file:
      - .env.docker
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-allright}
    depends_on:
      db:
        condition: service_healthy
    command: npx prisma migrate deploy
    networks:
      - app
    restart: "no"

  db:
    image: postgres:15-alpine
    container_name: allright-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-allright}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-allright}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - app
    restart: unless-stopped

volumes:
  db_data:

networks:
  app:
    driver: bridge
