services:
  web:
    image: node:22-alpine
    container_name: allright-web-dev
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    environment:
      - USE_DB=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-allright}
    command: sh -lc "corepack enable && pnpm install && npx prisma migrate deploy && pnpm dev"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: allright-db-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-allright}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-allright}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - app
    restart: unless-stopped

volumes:
  db_data:

networks:
  app:
    driver: bridge
